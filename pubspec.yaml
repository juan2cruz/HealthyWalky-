name: healthywalky
description: "HealthyWalky — corporate team step-ranking platform."
publish_to: 'none'

version: 1.0.3+4

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.9.0
  go_router: ^14.6.3
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  flutter_dotenv: ^5.2.1
  intl: ^0.20.2
  uuid: ^4.5.1
  health: ^12.0.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  mocktail: ^1.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
